name: Daily NVIDIA Supply Chain News Digest

on:
  schedule:
    # 每天 UTC 09:00 (北京时间下午5:00)
    - cron: '0 9 * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  daily-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch news
        run: python news_fetcher.py
      
      - name: Send email digest
        env:
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python email_sender.py
      
      - name: Archive results
        if: always()
        run: |
          mkdir -p archive
          if [ -f daily_news.json ]; then
            cp daily_news.json "archive/news-$(date +%Y-%m-%d).json"
          fi
      
      - name: Commit and push
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add archive/ || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Archive daily news - $(date +%Y-%m-%d)" || true
          git push || true
